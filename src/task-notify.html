<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --card-bg: #ffffff;
  --card-border: rgba(0,0,0,0.08);
  --text: #18181b;
  --muted: #71717a;
  --accent: #d97757;
  --accent-hover: #c4684a;
  --input-bg: #f4f4f5;
  --input-border: rgba(0,0,0,0.06);
  --tag-bg: #fef3c7;
  --tag-color: #92400e;
}
@media (prefers-color-scheme: dark) {
  :root {
    --card-bg: #18181b;
    --card-border: rgba(255,255,255,0.1);
    --text: #f4f4f5;
    --muted: #71717a;
    --input-bg: #27272a;
    --input-border: rgba(255,255,255,0.06);
    --tag-bg: #451a03;
    --tag-color: #fbbf24;
  }
}
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body { padding: 6px; }

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 16px 18px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
  gap: 10px;
  color: var(--text);
}
.tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 5px;
  background: var(--tag-bg);
  color: var(--tag-color);
}
.title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
}
.missing {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.45;
  padding: 8px 10px;
  background: var(--input-bg);
  border-radius: 8px;
  white-space: pre-wrap;
}
textarea {
  width: 100%;
  padding: 8px 10px;
  background: var(--input-bg);
  border: 1.5px solid var(--input-border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  resize: none;
  outline: none;
  min-height: 50px;
  max-height: 100px;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--muted); }
.actions {
  display: flex;
  gap: 8px;
}
.btn {
  flex: 1;
  padding: 7px 0;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  font-family: inherit;
  transition: all 0.15s;
}
.btn-send { background: var(--accent); color: #fff; }
.btn-send:hover { background: var(--accent-hover); }
.btn-later { background: transparent; color: var(--muted); border-color: var(--card-border); }
.btn-later:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div>
    <span class="tag">需要你补充</span>
  </div>
  <div class="title" id="taskTitle">—</div>
  <div class="missing" id="missingInfo">—</div>
  <textarea id="input" placeholder="在这里补充信息…"></textarea>
  <div class="actions">
    <button class="btn btn-send" id="btnSubmit">补充并重新执行</button>
    <button class="btn btn-later" id="btnDismiss">稍后再说</button>
  </div>
</div>
<script>
async function init() {
  const data = await window.notifyAPI.getData();
  document.getElementById("taskTitle").textContent = data.task || "—";
  document.getElementById("missingInfo").textContent = data.missing || "需要更多信息";
  document.getElementById("input").focus();
}

document.getElementById("btnSubmit").addEventListener("click", () => {
  const text = document.getElementById("input").value.trim();
  if (text) window.notifyAPI.submit(text);
  else window.notifyAPI.dismiss();
});

document.getElementById("btnDismiss").addEventListener("click", () => {
  window.notifyAPI.dismiss();
});

document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    document.getElementById("btnSubmit").click();
  }
  if (e.key === "Escape") window.notifyAPI.dismiss();
});

init();
</script>
</body>
</html>
