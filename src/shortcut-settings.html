<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<title>快捷键设置</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #fafafa;
  --card-bg: #ffffff;
  --card-border: rgba(0, 0, 0, 0.08);
  --text-primary: #18181b;
  --text-secondary: #52525b;
  --text-muted: #a1a1aa;
  --accent: #d97757;
  --accent-hover: #c4684a;
  --accent-dim: rgba(217, 119, 87, 0.10);
  --accent-glow: rgba(217, 119, 87, 0.20);
  --success: #22c55e;
  --danger: #ef4444;
  --input-bg: #f4f4f5;
  --input-border: rgba(0, 0, 0, 0.06);
  --divider: rgba(0, 0, 0, 0.06);
  --scrollbar-thumb: rgba(0,0,0,0.12);
  --badge-bg: #f4f4f5;
  --badge-border: rgba(0,0,0,0.10);
  --badge-text: #374151;
  --badge-shadow: 0 1px 0 rgba(0,0,0,0.06);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #09090b;
    --card-bg: #18181b;
    --card-border: rgba(255, 255, 255, 0.08);
    --text-primary: #f4f4f5;
    --text-secondary: #a1a1aa;
    --text-muted: #52525b;
    --accent-dim: rgba(217, 119, 87, 0.12);
    --accent-glow: rgba(217, 119, 87, 0.25);
    --input-bg: #27272a;
    --input-border: rgba(255, 255, 255, 0.06);
    --divider: rgba(255, 255, 255, 0.06);
    --scrollbar-thumb: rgba(255,255,255,0.12);
    --badge-bg: #27272a;
    --badge-border: rgba(255,255,255,0.12);
    --badge-text: #d4d4d8;
    --badge-shadow: 0 1px 0 rgba(255,255,255,0.04);
  }
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: var(--text-primary);
  overflow: hidden;
}

/* ── Shell layout ── */
.shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Titlebar (drag region) ── */
.titlebar {
  -webkit-app-region: drag;
  display: flex;
  align-items: center;
  height: 38px;
  padding: 0 16px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--divider);
  flex-shrink: 0;
}
.titlebar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
  margin: 0 auto;
}

/* ── Scrollable content ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

/* ── Shortcut item ── */
.shortcut-item {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.shortcut-item.recording {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.item-info { flex: 1; min-width: 0; }
.item-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
}
.item-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.4;
  margin-top: 2px;
}

/* ── Key badge group (clickable) ── */
.key-group {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid var(--card-border);
  background: var(--input-bg);
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
  user-select: none;
  -webkit-user-select: none;
}
.key-group:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.recording .key-group {
  border-color: var(--accent);
  background: var(--accent-dim);
  animation: pulse-glow 1.4s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 2px var(--accent-glow); }
  50%      { box-shadow: 0 0 0 4px transparent; }
}

/* ── Individual key cap ── */
.key-cap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--badge-bg);
  border: 1px solid var(--badge-border);
  border-bottom-width: 2px;
  border-radius: 5px;
  padding: 3px 7px;
  font-size: 12px;
  font-weight: 600;
  color: var(--badge-text);
  line-height: 1;
  white-space: nowrap;
  box-shadow: var(--badge-shadow);
  font-family: -apple-system, "SF Mono", Menlo, monospace;
  min-width: 24px;
  text-align: center;
}
.key-plus {
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 400;
  line-height: 1;
}

/* ── Item footer: status + actions ── */
.item-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 22px;
}
.status-msg {
  font-size: 12px;
  color: var(--text-muted);
  flex: 1;
  min-width: 0;
  transition: color 0.15s;
}
.status-msg.ok  { color: var(--success); font-weight: 500; }
.status-msg.err { color: var(--danger); font-weight: 500; }

.recording-hint {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.recording .recording-hint { opacity: 1; }

.btn-reset {
  background: none;
  border: 1px solid var(--card-border);
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: 6px;
  font-family: inherit;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-reset:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Footer note ── */
.footer-note {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.6;
  padding: 4px 16px 16px;
  flex-shrink: 0;
}
.footer-note kbd {
  font-family: -apple-system, "SF Mono", Menlo, monospace;
  font-size: 10px;
  background: var(--badge-bg);
  border: 1px solid var(--badge-border);
  border-bottom-width: 2px;
  padding: 1px 5px;
  border-radius: 4px;
  color: var(--badge-text);
}
</style>
</head>
<body>
<div class="shell">
  <div class="titlebar">
    <span class="titlebar-title">快捷键设置</span>
  </div>

  <div class="content">
    <!-- 划词评论 -->
    <div class="shortcut-item" id="row-chat">
      <div class="item-header">
        <div class="item-info">
          <div class="item-label">划词评论</div>
          <div class="item-desc">选中文字后按下快捷键，发给 Claude 处理</div>
        </div>
        <div class="key-group" id="kg-chat" role="button" tabindex="0" title="点击录制新快捷键"></div>
      </div>
      <div class="item-footer">
        <span class="status-msg" id="status-chat"></span>
        <span class="recording-hint">● 按下新组合键…</span>
        <button class="btn-reset" id="reset-chat">恢复默认</button>
      </div>
    </div>

    <!-- 加入任务 -->
    <div class="shortcut-item" id="row-task">
      <div class="item-header">
        <div class="item-info">
          <div class="item-label">加入任务</div>
          <div class="item-desc">快速添加一条任务到执行队列</div>
        </div>
        <div class="key-group" id="kg-task" role="button" tabindex="0" title="点击录制新快捷键"></div>
      </div>
      <div class="item-footer">
        <span class="status-msg" id="status-task"></span>
        <span class="recording-hint">● 按下新组合键…</span>
        <button class="btn-reset" id="reset-task">恢复默认</button>
      </div>
    </div>
  </div>

  <div class="footer-note">
    <kbd>Ctrl</kbd> + <kbd>Space</kbd> 可能与输入法冲突，可在此更换
  </div>
</div>

<script>
// ── Accelerator → Display ──
function accelToDisplay(accel) {
  if (!accel) return ["?"];
  return accel.split("+").map(key => {
    switch (key) {
      case "F18":     return "Fn";
      case "Return":  return "↵";
      case "Space":   return "Space";
      case "Control": return "⌃";
      case "Ctrl":    return "⌃";
      case "Shift":   return "⇧";
      case "Alt":     return "⌥";
      case "Option":  return "⌥";
      case "Command": return "⌘";
      case "Cmd":     return "⌘";
      case "Meta":    return "⌘";
      case "Super":   return "❖";
      case "Tab":     return "⇥";
      case "Escape":  return "Esc";
      case "Backspace": return "⌫";
      case "Delete":  return "⌦";
      case "Up":      return "↑";
      case "Down":    return "↓";
      case "Left":    return "←";
      case "Right":   return "→";
      default:        return key.length === 1 ? key.toUpperCase() : key;
    }
  });
}

function renderBadges(groupEl, accel) {
  const parts = accelToDisplay(accel);
  groupEl.innerHTML = "";
  parts.forEach((part, i) => {
    const cap = document.createElement("span");
    cap.className = "key-cap";
    cap.textContent = part;
    groupEl.appendChild(cap);
    if (i < parts.length - 1) {
      const plus = document.createElement("span");
      plus.className = "key-plus";
      plus.textContent = "+";
      groupEl.appendChild(plus);
    }
  });
}

// ── State ──
let shortcuts = { chat: "", task: "" };
let defaults  = { chat: "", task: "" };
let recording = null;

// ── Keydown → Electron accelerator ──
const MODIFIER_KEYS = new Set(["Control", "Shift", "Alt", "Meta", "AltGraph"]);

function keydownToAccel(e) {
  const parts = [];
  if (e.ctrlKey)  parts.push("Control");
  if (e.shiftKey) parts.push("Shift");
  if (e.altKey)   parts.push("Alt");
  if (e.metaKey)  parts.push("Command");
  const key = e.key;
  if (!MODIFIER_KEYS.has(key)) {
    let mapped = key;
    switch (key) {
      case "Enter":      mapped = "Return";    break;
      case " ":          mapped = "Space";     break;
      case "Escape":     mapped = "Escape";    break;
      case "Backspace":  mapped = "Backspace"; break;
      case "Delete":     mapped = "Delete";    break;
      case "Tab":        mapped = "Tab";       break;
      case "ArrowUp":    mapped = "Up";        break;
      case "ArrowDown":  mapped = "Down";      break;
      case "ArrowLeft":  mapped = "Left";      break;
      case "ArrowRight": mapped = "Right";     break;
      default:
        if (key.length === 1) mapped = key.toUpperCase();
        else mapped = key;
    }
    parts.push(mapped);
  }
  return parts.length > 0 ? parts.join("+") : null;
}

// ── Recording logic ──
function startRecording(which) {
  if (recording === which) { stopRecording(); return; }
  if (recording) stopRecording();
  recording = which;
  document.getElementById(`row-${which}`).classList.add("recording");
  setStatus(which, "", "");
}

function stopRecording() {
  if (!recording) return;
  document.getElementById(`row-${recording}`).classList.remove("recording");
  recording = null;
}

function setStatus(which, msg, cls) {
  const el = document.getElementById(`status-${which}`);
  el.textContent = msg;
  el.className = "status-msg" + (cls ? " " + cls : "");
  if (cls === "ok" || cls === "err") {
    setTimeout(() => {
      if (el.className.includes(cls)) { el.textContent = ""; el.className = "status-msg"; }
    }, 2500);
  }
}

// ── Init ──
window.addEventListener("DOMContentLoaded", async () => {
  try {
    const data = await window.shortcutAPI.getShortcuts();
    shortcuts.chat = data.chatShortcut;
    shortcuts.task = data.quickTaskShortcut;
    defaults.chat  = data.defaultChatShortcut;
    defaults.task  = data.defaultQuickTaskShortcut;
  } catch (err) {
    console.error("get-shortcuts failed", err);
  }

  renderBadges(document.getElementById("kg-chat"), shortcuts.chat);
  renderBadges(document.getElementById("kg-task"), shortcuts.task);

  // Click key-group → toggle recording
  document.getElementById("kg-chat").addEventListener("click", () => startRecording("chat"));
  document.getElementById("kg-task").addEventListener("click", () => startRecording("task"));

  // Keyboard a11y
  ["kg-chat", "kg-task"].forEach(id => {
    const which = id.replace("kg-", "");
    document.getElementById(id).addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); startRecording(which); }
    });
  });

  // Reset buttons
  document.getElementById("reset-chat").addEventListener("click", async () => {
    const accel = defaults.chat;
    if (!accel) return;
    const ok = await window.shortcutAPI.setShortcut("chat", accel);
    if (ok) {
      shortcuts.chat = accel;
      renderBadges(document.getElementById("kg-chat"), accel);
      setStatus("chat", "已恢复默认 ✓", "ok");
    } else {
      setStatus("chat", "恢复失败，快捷键被占用", "err");
    }
  });
  document.getElementById("reset-task").addEventListener("click", async () => {
    const accel = defaults.task;
    if (!accel) return;
    const ok = await window.shortcutAPI.setShortcut("task", accel);
    if (ok) {
      shortcuts.task = accel;
      renderBadges(document.getElementById("kg-task"), accel);
      setStatus("task", "已恢复默认 ✓", "ok");
    } else {
      setStatus("task", "恢复失败，快捷键被占用", "err");
    }
  });

  // Global keydown: capture when recording
  window.addEventListener("keydown", async (e) => {
    if (!recording) return;
    e.preventDefault();
    e.stopPropagation();
    if (e.key === "Escape") {
      const w = recording;
      stopRecording();
      setStatus(w, "已取消", "");
      return;
    }
    if (MODIFIER_KEYS.has(e.key)) return;
    const accel = keydownToAccel(e);
    if (!accel) return;
    const which = recording;
    stopRecording();
    const ok = await window.shortcutAPI.setShortcut(which, accel);
    if (ok) {
      shortcuts[which] = accel;
      renderBadges(document.getElementById(`kg-${which}`), accel);
      setStatus(which, "已保存 ✓", "ok");
    } else {
      renderBadges(document.getElementById(`kg-${which}`), shortcuts[which]);
      setStatus(which, "注册失败，快捷键已被占用", "err");
    }
  }, true);

  // Click outside → cancel recording
  document.addEventListener("click", (e) => {
    if (!recording) return;
    if (!document.getElementById(`kg-${recording}`).contains(e.target)) stopRecording();
  });
});
</script>
</body>
</html>
